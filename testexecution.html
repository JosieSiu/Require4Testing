<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Test durchführen</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Require4Testing</h1>
    <nav>
      <a href="index.html">Start</a>
      <a href="testcase.html">Testfälle</a>
      <a href="testrun.html">Testläufe</a>
      <a href="testexecution.html">Test durchführen</a>
    </nav>
  </div>
</header>

<main>
  <section class="form-section">

    <h2>🧪 Test durchführen</h2>

    <label>Tester:in</label>
    <input type="text" id="tester" placeholder="Name eingeben">

    <label>Testfall</label>
    <select id="testcase">
      <option>Login Test</option>
      <option>Registrierung Test</option>
    </select>

    <label>Testlauf</label>
    <select id="testrun">
      <option>Release 1.0</option>
      <option>Hotfix Tests</option>
    </select>

    <label>Ergebnis</label>
    <select id="result">
      <option value="PASS">PASS</option>
      <option value="FAIL">FAIL</option>
    </select>

    <button onclick="submitTest()">Speichern</button>

  </section>
</main>

<footer>
  <p>© 2026 Require4Testing</p>
</footer>

<script>
function submitTest() {

  const tester = document.getElementById("tester").value;
  const testcase = document.getElementById("testcase").value;
  const testrun = document.getElementById("testrun").value;
  const result = document.getElementById("result").value;

  if(!tester){
    alert("Bitte Tester eingeben!");
    return;
  }

  window.location.href =
    "confirmation.html?tester=" + tester +
    "&testcase=" + testcase +
    "&testrun=" + testrun +
    "&result=" + result;
}
</script>

</body>
</html>
